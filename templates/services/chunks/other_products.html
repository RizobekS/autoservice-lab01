{% load service_url %}

{% if other_products %}
  <div>
    <h6 class="widget-title">Другие работы по {{ current_section.title_dative }}</h6>
    <div class="ls ms widget-service">
      <ul class="list1 columns-1 columns-sm-2">
        {% for item in other_products %}
          <li class="mb-20 icon-inline">
            <a href="{% service_url item %}" class="fw-500 color-dark">{{ item.title }}</a>
          </li>
        {% endfor %}
      </ul>
    </div>
  </div>
{% endif %}
