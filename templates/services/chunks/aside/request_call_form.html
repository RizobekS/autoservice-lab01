{% load errors %}
<div class="bg-maincolor2 tab-content">
  <div class="widget widget-call">
    <h5 class="widget-title">Уточнить стоимость для вашего автомобиля</h5>
    <form action="{% url 'services:submit_call_request' %}" method="POST" class="form-aside form-call">

      {% csrf_token %}
      {% non_field_errors form %}

      {% for message in messages %}<p class="{{ message.extra_tags }} font-weight-bold">{{ message }}</p>{% endfor %}

      <div class="form-group">
        <label class="screen-reader-text" for="call-phone">
          Ваш телефон:
        </label>
        <input type="phone" class="form-control-bg" placeholder="Ваш телефон:" size="{{ form.fields.phone.max_length }}"
               value="{{ form.phone.value|default_if_none:'' }}" name="{{ form.phone.name }}" id="call-phone">
        {% field_errors form.phone %}
      </div>

      <div class="form-group choices-plain choices-plain--field">
        <div class="select bg-white">
          {{ form.branch }}
        </div>
        {% field_errors form.branch %}
      </div>
      <button type="submit" class="btn btn-small btn-maincolor btn-submit">Заказать звонок</button>
    </form>
  </div>
</div>
