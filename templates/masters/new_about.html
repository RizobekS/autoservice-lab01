{% extends 'new_base.html' %}
{% load deferred_static %}
{% load static %}
{% load cropping %}

{% block page_title %}
  {% include 'chunks/header/new_title.html' %}
{% endblock %}

{% block main %}
<!-- =========================== Team section start ====================================== -->
<section class="team py-110">
    <div class="container">
        <div class="row gy-4">
          {% for obj in masters %}
            <div class="col-xl-4 col-md-6" data-aos="fade-up" data-aos-duration="800" data-aos-delay="100">
                <div class="team-page-item group group-item social-icon-hover position-relative">
                    <div
                        class="d-block hover-animation-white scale-up-wrapper position-relative overflow-hidden z-1 hover-bg-main-light tw-rounded-lg">
                        <a class="w-100 h-100 d-block tw-rounded-lg">
                            <img src="{% cropped_thumbnail obj 'thumbnail' %}"
                                class="object-fit-cover scale-up__img w-100 h-100 tw-rounded-lg"
                                alt="{{ obj.name }}">
                        </a>
                    </div>
                    <div class="tw-px-6 z-1 position-relative tw--mt-70-px">
                        <div
                            class="bg-white tw-py-8 tw-px-6 common-shadow-five d-flex align-items-center justify-content-between tw-gap-4 tw-rounded-2xl">
                            <div class="">
                                <h2 class="h5">
                                    <a class="text-heading hover-text-main">{{ obj.name }}</a>
                                </h2>
                                <span class="d-block text-body tw-mt-3">{{ obj.position_string }}</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
          {% endfor %}
        </div>
    </div>
</section>
<!-- =========================== Team section end ====================================== -->
{% endblock %}
