{% if tags.count %}
    <div class="widget widget_tag_cloud mt-5 mb-5">
        <h5 class="widget-title">Тэги</h5>
        <div class="tagcloud">
            {% for item in tags.all %}
                <a href="{% url 'tags:single' item.url %}" class="tag-cloud-link">
                    <span>{{ item.name }}</span>
                </a>
            {% endfor %}
        </div>
    </div>
{% endif %}
