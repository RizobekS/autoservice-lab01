{% extends 'static/new_base.html' %}
{% load deferred_static %}
{% load static %}


{% block main %}

<section class="gallery overflow-hidden tw-py-10 container">
    <div class="row row-cols-xxl-3 row-cols-md-2 row-cols-sm-2 row-cols-1 gap-3 d-flex justify-content-center">
      <div class="col p-0 z-2" data-aos="fade-up" data-aos-duration="800" data-aos-delay="200">
        <div class="gallery-item position-relative group group-item">
          <div class="d-block scale-up-wrapper position-relative overflow-hidden z-1">
            <div class="w-100 h-100 d-block">
              <a href="{% static 'images/certificates/certificate-1.png' %}"
                class="gallery-popup tw-rounded-lg border border-2 border-main overflow-hidden hover-item-overlay position-relative">
                <img src="{% static 'images/certificates/certificate-1.png' %}" alt="Сертификат {{ site_name }}"
                  class="w-100 h-100 object-fit-cover">
              </a>
            </div>
          </div>
        </div>
      </div>
      <div class="col p-0 z-2" data-aos="fade-up" data-aos-duration="800" data-aos-delay="400">
        <div class="gallery-item position-relative group group-item">
          <div class="d-block scale-up-wrapper position-relative overflow-hidden z-1">
            <div class="w-100 h-100 d-block">
              <a href="{% static 'images/certificates/certificate-2.png' %}"
                class="gallery-popup tw-rounded-lg border border-2 border-main overflow-hidden hover-item-overlay position-relative">
                <img src="{% static 'images/certificates/certificate-2.png' %}" alt="Сертификат {{ site_name }}"
                  class="w-100 h-100 object-fit-cover">
              </a>
            </div>
          </div>
        </div>
      </div>
    </div>
</section>
{% endblock %}
