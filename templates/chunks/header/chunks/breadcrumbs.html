<li class="breadcrumb-item">
  <a href="{% url 'home:index' %}">Главная</a>
</li>
{% for breadcrumb in breadcrumbs %}
  {% if forloop.last %}
    <li class="breadcrumb-item active">
      {{ breadcrumb.title }}
    </li>
  {% else %}
    <li class="breadcrumb-item">
      <a href="{{ breadcrumb.url }}">{{ breadcrumb.title }}</a>
    </li>
  {% endif %}
{% endfor %}
