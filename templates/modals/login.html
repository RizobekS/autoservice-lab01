{% load static %}

<div class="modal fade" id="modalLoginForm" tabindex="-1" role="dialog" aria-labelledby="modalLoginForm" aria-hidden="true">
  <div class="modal-dialog" role="document">
    <div class="modal-content">
      <button type="button" class="close" data-dismiss="modal" aria-label="Close">
        <span>×</span>
      </button>
      <div class="row c-gutter-0">
        <div class="col-12 col-lg-6 login-form-main">
          <div class="modal-header justify-content-center">
            <h4 class="modal-title">Вход</h4>
          </div>
          <div class="modal-body">
            <form action="/">
              <div class="form-group has-placeholder">
                <label for="name-sigin">Ваш телефон:</label>
                <input type="text" class="form-control" id="name-phone" placeholder="Ваш телефон" name="phone">
              </div>
              <div class="form-group has-placeholder">
                <label for="sigpassword">Пароль:</label>
                <input type="password" class="form-control" id="sigpassword" placeholder="Пароль" name="sigpassword">
              </div>
              <div class="modal-password">
                <a href="shop-account-password-reset.html" class="modal-password-btn">Забыли пароль?</a>
              </div>
              <div class="modal-password">
                Если у вас еще нет личного кабинета <a href="shop-account-login.html" class="modal-password-btn">зарегистрируйтесь</a> и получайте скидки с каждого заказа.
              </div>
              <div class="modal-footer d-flex justify-content-center">
                <button type="submit" class="btn btn-small btn-maincolor log-btn">Войти</button>
              </div>
            </form>
          </div>
        </div>
        <div class="col-6 ds s-overlay">
          <img src="{% static 'images/modal-login-form.png' %}" alt="">
        </div>
      </div>
    </div>
  </div>
</div>
