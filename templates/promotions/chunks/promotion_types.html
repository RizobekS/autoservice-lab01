{% if categories %}
    <div class="widget widget_categories">

        <h5 class="widget-title">Типы акции</h5>

        <ul>
            {% for item in categories %}
                <li class="cat-item">
                    <a class="active" href="{% url 'promotions:category' item.url %}">{{ item.name }}</a>
                </li>
            {% endfor %}
        </ul>
    </div>
{% endif %}
