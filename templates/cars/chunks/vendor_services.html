{% load service_url %}
{% load static %}
{% load cropping %}

{% for section in sections %}
  <section class="ls ms s-pt-5 s-pb-3 s-pt-md-50 s-pb-md-45 s-py-lg-140 c-mb-40 c-mb-md-0 side-section text-center text-md-left">
    <div class="divider-5"></div>
    <div class="cover-image s-cover-left"></div><!-- half image background element -->
    <div class="container">
      <div class="row">
        <div class="col-md-6">
          <img src="{% cropped_thumbnail section 'vendor_page_thumbnail' %}" alt="{{ section.title }}">
        </div>
        <div class="col-md-6">
          <div class="service-content content-left-padding">
            <h3 class="special-heading">{{ section.title }}<span class="text-gradient">{{ car.full_name }}</span></h3>

            {{ section.description| safe }}

            <a href="{% service_url section %}" class="btn btn-darkgrey">Услуги по {{ section.title_dative| lower }} {{ car.full_name }}</a>
          </div>
        </div>
      </div>
    </div>
  </section>
{% endfor %}
