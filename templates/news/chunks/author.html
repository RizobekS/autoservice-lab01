{% load cropping %}
<div class="widget widget_author_bio ls ms text-center">
  <div class="item-media">
    <img src="{% cropped_thumbnail article.author 'thumbnail' %}" alt="{{ article.author.name }}">
  </div>
  <div class="item-content mt-25">
    <h6 class="fw-700 mb-10">
      {{ article.author.name }}
    </h6>
    <p>
      {{ article.position_string }}
    </p>
  </div>
</div>
